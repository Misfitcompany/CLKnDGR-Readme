<svg viewBox="0 0 820 680" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Helvetica, Arial, sans-serif" role="img" aria-label="How Halal lending works on CLKnDGR">
  <title>Halal Lending on CLKnDGR — how it works</title>
  <desc>A 10,000 QU deposit stays locked and earning for the vault term. Mid-term the depositor borrows 5,000 QU interest-free and holds it until repaying later, while the deposit keeps earning the whole time. The design rests on Qard Hasan (interest-free loan), Mudarabah (profit-sharing) and Rahn (fair collateral).</desc>

  <defs>
    <marker id="dn" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L7,3 L0,6 Z" fill="#15803d"/></marker>
    <marker id="up" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L7,3 L0,6 Z" fill="#9ca3af"/></marker>
  </defs>

  <!-- card -->
  <rect x="8" y="8" width="804" height="664" rx="18" fill="#ffffff" stroke="#e5e7eb" stroke-width="1.5"/>

  <!-- title -->
  <rect x="22" y="26" width="6" height="42" rx="3" fill="#15803d"/>
  <text x="40" y="47" font-size="22" font-weight="700" fill="#111827">Halal Lending on CLKnDGR</text>
  <text x="40" y="68" font-size="13" fill="#6b7280">Interest-free liquidity against your locked vault deposit</text>
  <line x1="22" y1="86" x2="798" y2="86" stroke="#e5e7eb" stroke-width="1"/>

  <!-- ===== HOW IT WORKS ===== -->
  <text x="22" y="112" font-size="12" font-weight="700" letter-spacing="0.6" fill="#15803d">HOW IT WORKS · a depositor's vault term</text>

  <text x="331" y="138" text-anchor="middle" font-size="12" font-weight="700" fill="#15803d">Mid-term · borrow ↓</text>
  <text x="593" y="138" text-anchor="middle" font-size="12" font-weight="600" fill="#6b7280">Later · repay ↑</text>

  <line x1="331" y1="144" x2="331" y2="300" stroke="#e5e7eb" stroke-width="1" stroke-dasharray="3 3"/>
  <line x1="593" y1="144" x2="593" y2="300" stroke="#e5e7eb" stroke-width="1" stroke-dasharray="3 3"/>

  <!-- deposit bar (unbroken) -->
  <rect x="70" y="156" width="680" height="52" rx="10" fill="#dcfce7" stroke="#15803d" stroke-width="2"/>
  <text x="410" y="181" text-anchor="middle" font-size="14" font-weight="700" fill="#111827">Your 10,000 QU — locked &amp; earning the whole time</text>
  <text x="410" y="199" text-anchor="middle" font-size="11.5" fill="#15803d">never stops, even while you hold the borrowed cash</text>

  <!-- borrow / repay arrows -->
  <line x1="331" y1="210" x2="331" y2="266" stroke="#15803d" stroke-width="2" marker-end="url(#dn)"/>
  <line x1="593" y1="266" x2="593" y2="210" stroke="#9ca3af" stroke-width="2" marker-end="url(#up)"/>

  <!-- cash in hand (only mid-term -> later) -->
  <rect x="331" y="268" width="262" height="50" rx="10" fill="#f3f4f6" stroke="#9ca3af" stroke-width="1.5"/>
  <text x="462" y="290" text-anchor="middle" font-size="13" font-weight="700" fill="#111827">5,000 QU cash in hand</text>
  <text x="462" y="307" text-anchor="middle" font-size="11" fill="#6b7280">0% interest · use it freely</text>

  <!-- timeline axis -->
  <line x1="70" y1="340" x2="750" y2="340" stroke="#9ca3af" stroke-width="1.5"/>
  <g font-size="11" fill="#6b7280">
    <line x1="70"  y1="336" x2="70"  y2="344" stroke="#9ca3af" stroke-width="1.5"/><text x="70"  y="358" text-anchor="start">Start</text>
    <line x1="331" y1="336" x2="331" y2="344" stroke="#9ca3af" stroke-width="1.5"/><text x="331" y="358" text-anchor="middle">Borrow</text>
    <line x1="593" y1="336" x2="593" y2="344" stroke="#9ca3af" stroke-width="1.5"/><text x="593" y="358" text-anchor="middle">Repay</text>
    <line x1="750" y1="336" x2="750" y2="344" stroke="#9ca3af" stroke-width="1.5"/><text x="750" y="358" text-anchor="end">Term ends</text>
  </g>

  <line x1="22" y1="386" x2="798" y2="386" stroke="#e5e7eb" stroke-width="1"/>

  <!-- ===== WHY PERMISSIBLE ===== -->
  <text x="22" y="412" font-size="12" font-weight="700" letter-spacing="0.6" fill="#15803d">WHY IT'S PERMISSIBLE UNDER SHARIAH</text>

  <!-- pillar 1 -->
  <rect x="22" y="426" width="249" height="128" rx="12" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>
  <circle cx="42" cy="452" r="5" fill="#15803d"/>
  <text x="56" y="457" font-size="13.5" font-weight="700" fill="#111827">No interest (Qard Hasan)</text>
  <g font-size="11" fill="#4b5563">
    <text x="40" y="486">A benevolent, interest-free loan.</text>
    <text x="40" y="503">You repay exactly what you</text>
    <text x="40" y="520">borrowed — never a coin more.</text>
    <text x="40" y="537">Riba (interest) is forbidden.</text>
  </g>

  <!-- pillar 2 -->
  <rect x="285" y="426" width="249" height="128" rx="12" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>
  <circle cx="305" cy="452" r="5" fill="#15803d"/>
  <text x="319" y="457" font-size="13.5" font-weight="700" fill="#111827">Profit from real trade</text>
  <g font-size="11" fill="#4b5563">
    <text x="303" y="486">Income comes from shared-risk</text>
    <text x="303" y="503">trading (Mudarabah), not from</text>
    <text x="303" y="520">your loan. Real profit &amp; loss —</text>
    <text x="303" y="537">no guaranteed return.</text>
  </g>

  <!-- pillar 3 -->
  <rect x="548" y="426" width="249" height="128" rx="12" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>
  <circle cx="568" cy="452" r="5" fill="#15803d"/>
  <text x="582" y="457" font-size="13.5" font-weight="700" fill="#111827">Fair collateral (Rahn)</text>
  <g font-size="11" fill="#4b5563">
    <text x="566" y="486">If a loan must be settled, only</text>
    <text x="566" y="503">what's owed is sold — the rest</text>
    <text x="566" y="520">returns to you. The surplus is</text>
    <text x="566" y="537">never confiscated.</text>
  </g>

  <!-- footer caveat -->
  <rect x="22" y="582" width="776" height="58" rx="10" fill="#fffbeb" stroke="#fde68a" stroke-width="1"/>
  <text x="38" y="606" font-size="12" font-weight="700" fill="#92400e">⚠  Design proposal — pending review by a qualified Shariah board.</text>
  <text x="38" y="624" font-size="10.5" fill="#92400e">A compliant base chain does not make a new product compliant; each new product needs its own Shariah approval before launch.</text>
</svg>
